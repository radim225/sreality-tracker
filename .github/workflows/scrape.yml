name: Scrape Sreality

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scrape.py

      - name: Mirror dashboard as Pages index
        run: cp dashboard.html index.html

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add snapshots latest_snapshot.json last_changes.json dashboard.html index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Sreality snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
